name: Build OpenWrt System Image - Phicomm N1

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Source branch"
        required: false
        default: "lede_master"
        type: choice
        options:
          - lede_master
          - openwrt_main
          - immortalwrt_master
      openwrt_board:
        description: "Target board"
        required: false
        default: "phicomm-n1"
        type: choice
        options:
          - phicomm-n1
          - all
      openwrt_kernel:
        description: "Kernel version"
        required: false
        default: "6.1.y"
        type: choice
        options:
          - 6.1.y
          - 5.15.y
          - 6.6.y
          - 6.12.y
      auto_kernel:
        description: "Auto use latest kernel"
        required: false
        default: true
        type: boolean
      kernel_usage:
        description: "Kernel tag type"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - dev
          - beta
      openwrt_size:
        description: "rootfs size in MiB (min 512)"
        required: false
        default: "1024"
      openwrt_ip:
        description: "LAN default IP"
        required: false
        default: "192.168.1.1"
      builder_name:
        description: "Builder name"
        required: false
        default: "ophub"
      enable_ccache:
        description: "Enable ccache"
        required: false
        default: false
        type: boolean

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile || true
          sudo -E apt-get -y update
          sudo -E apt-get -y install --no-install-recommends \
            ack asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
            flex gawk gettext gcc-multilib g++-multilib git gperf \
            haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz msmtp ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pyelftools \
            python3-setuptools qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo unzip vim wget xmlto xxd zlib1g-dev || true
          sudo -E apt-get -y install antlr3  || true
          sudo -E apt-get -y install fastjar || true
          sudo -E apt-get -y install upx || true
          sudo -E apt-get -y install genisoimage || true
          sudo -E apt-get -y autoremove --purge && sudo -E apt-get clean
          sudo mkdir -p /mnt/workdir
          sudo chown runner:runner /mnt/workdir
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Clone source [ ${{ inputs.source_branch }} ]
        id: codes
        working-directory: /mnt/workdir
        if: steps.init.outputs.status == 'success' && !cancelled()
        run: |
          declare -A REPO_MAP=(
            ["lede_master"]="https://github.com/coolsnowwolf/lede master"
            ["openwrt_main"]="https://github.com/openwrt/openwrt main"
            ["immortalwrt_master"]="https://github.com/immortalwrt/immortalwrt master"
          )
          repo_info="${REPO_MAP[${{ inputs.source_branch }}]}"
          git clone -q --single-branch --depth=1 --branch="${repo_info#* }" "${repo_info% *}" openwrt
          ln -sf /mnt/workdir/openwrt "${GITHUB_WORKSPACE}/openwrt"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Load custom feeds
        if: steps.codes.outputs.status == 'success' && !cancelled()
        run: |
          CONF_DIR="${GITHUB_WORKSPACE}/config/${{ inputs.source_branch }}"
          [[ -f "${CONF_DIR}/feeds.conf.default" ]] && cp -f "${CONF_DIR}/feeds.conf.default" openwrt/feeds.conf.default
          chmod +x "${CONF_DIR}/diy-part1.sh"
          cd openwrt && "${CONF_DIR}/diy-part1.sh"

      - name: Update and install feeds
        if: steps.codes.outputs.status == 'success' && !cancelled()
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Load config (inject OpenClash + Tailscale + iStore)
        if: steps.codes.outputs.status == 'success' && !cancelled()
        run: |
          CONF_DIR="${GITHUB_WORKSPACE}/config/${{ inputs.source_branch }}"
          [[ -d "${CONF_DIR}/files" ]] && cp -rf "${CONF_DIR}/files" openwrt/files
          [[ -f "${CONF_DIR}/config" ]] && cp -f "${CONF_DIR}/config" openwrt/.config
          chmod +x "${CONF_DIR}/diy-part2.sh"
          cd openwrt && "${CONF_DIR}/diy-part2.sh" \
            "${{ inputs.openwrt_ip }}" "${{ inputs.enable_ccache }}"

      - name: Download packages
        id: download
        if: steps.codes.outputs.status == 'success' && !cancelled()
        run: |
          cd openwrt && make defconfig
          make download -j8
          find dl -size -1024c -exec rm -f {} \;
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Compile firmware
        id: compile
        if: steps.download.outputs.status == 'success' && !cancelled()
        run: |
          cd openwrt
          make -j$(($(nproc)+1)) || make -j1 || make -j1 V=s
          echo "build_tag=OpenWrt_${{ inputs.source_branch }}_$(date +\"%Y.%m\")" >> ${GITHUB_OUTPUT}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload rootfs to Release
        uses: ncipollo/release-action@main
        if: steps.compile.outputs.status == 'success' && !cancelled()
        with:
          tag: ${{ steps.compile.outputs.build_tag }}
          artifacts: openwrt/bin/targets/*/*/*.tar.gz
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ github.token }}

      - name: Package firmware for Phicomm N1
        if: steps.compile.outputs.status == 'success' && !cancelled()
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/*/*/*.tar.gz
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_usage: ${{ inputs.kernel_usage }}
          openwrt_size: ${{ inputs.openwrt_size }}
          

      - name: Upload firmware to Release
        uses: ncipollo/release-action@main
        if: env.PACKAGED_STATUS == 'success' && !cancelled()
        with:
          tag: openwrt_phicomm_n1_${{ env.PACKAGED_OUTPUTDATE }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ github.token }}
          body: |
            ### OpenWrt Firmware - Phicomm N1 (Amlogic S905D)
            | Item | Value |
            |---|---|
            | Board | phicomm-n1 |
            | SoC | Amlogic S905D |
            | Kernel | ${{ inputs.openwrt_kernel }} (${{ inputs.kernel_usage }}) |
            | Source | ${{ inputs.source_branch }} |
            | LAN IP | ${{ inputs.openwrt_ip }} |
            | Bundled | OpenClash + Tailscale + iStore |
            > First use: SSH and run openwrt-install-amlogic to write to eMMC
