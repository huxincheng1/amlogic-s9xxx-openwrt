name: Build OpenWrt → Phicomm N1 (Releases)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "选择源码分支"
        required: false
        default: "lede_master"
        type: choice
        options:
          - lede_master
          - openwrt_main
          - immortalwrt_master
      openwrt_board:
        description: "选择目标设备"
        required: false
        default: "phicomm-n1"
        type: choice
        options:
          - phicomm-n1
          - all
      openwrt_kernel:
        description: "选择内核版本"
        required: false
        default: "6.1.y"
        type: choice
        options:
          - 6.1.y
          - 5.15.y
          - 6.6.y
          - 6.12.y
      auto_kernel:
        description: "自动使用最新内核"
        required: false
        default: true
        type: boolean
      kernel_usage:
        description: "内核标签类型"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - dev
          - beta
      openwrt_size:
        description: "设置 rootfs 大小（单位：MiB，最小 512）"
        required: false
        default: "1024"

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化编译环境
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://is.gd/depend_ubuntu2204_openwrt)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 下载 OpenWrt rootfs 文件
        id: down
        if: ${{ steps.init.outputs.status }} == 'success' && !cancelled()
        run: |
          openwrt_url="$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases" |
            jq -r '[.[] | select(.assets | length > 0)] | last | .assets[] | select(.name | test(".*rootfs\\.tar\\.gz$")) | .browser_download_url' |
            head -n 1)"
          [[ -z "${openwrt_url}" ]] && echo "未找到 OpenWrt rootfs 文件。" && exit 1
          curl -fsSL "${openwrt_url}" -o "openwrt-armsr-armv8-generic-rootfs.tar.gz"
          ls -lh *.tar.gz
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 打包 OpenWrt 固件（Phicomm N1 专用）
        if: ${{ steps.down.outputs.status }} == 'success' && !cancelled()
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt-armsr-armv8-generic-rootfs.tar.gz
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_usage: ${{ inputs.kernel_usage }}
          openwrt_size: ${{ inputs.openwrt_size }}
          gh_token: ${{ secrets.GH_TOKEN }}

      - name: 上传固件到 Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        with:
          tag: openwrt_phicomm_n1_${{ env.PACKAGED_OUTPUTDATE }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ secrets.GH_TOKEN }}
          body: |
            ### OpenWrt 固件 — 斐讯 N1（Amlogic S905D）

            | 项目 | 内容 |
            |------|------|
            | 设备 | 斐讯 N1 (`phicomm-n1`) |
            | SoC | Amlogic S905D |
            | 内核 | ${{ inputs.openwrt_kernel }} (${{ inputs.kernel_usage }}) |
            | 源码 | ${{ inputs.source_branch }} |
            | 内置 | OpenClash + 核心路由功能（精简构建） |

            > 首次使用：SSH 登录后执行 `openwrt-install-amlogic` 写入 eMMC
